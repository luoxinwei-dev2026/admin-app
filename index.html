<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#F2F2F7">
<title>管理员</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- PIN 设置页面 -->
<div id="page-pin-setup" class="page hidden">
  <div class="pin-container">
    <div class="pin-icon">
      <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM12 17c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zM15.1 8H8.9V6c0-1.71 1.39-3.1 3.1-3.1s3.1 1.39 3.1 3.1v2z"/></svg>
    </div>
    <h1 class="pin-title">设置密码</h1>
    <p class="pin-subtitle">请输入6位数字密码</p>
    <div class="pin-dots" id="setup-dots-1"></div>
    <div class="pin-keyboard" id="setup-keyboard-1"></div>

    <div class="pin-divider"></div>
    <p class="pin-subtitle">再次确认密码</p>
    <div class="pin-dots" id="setup-dots-2"></div>
    <div class="pin-keyboard" id="setup-keyboard-2"></div>

    <button class="pin-btn-clear" id="btn-clear-setup">清除</button>
  </div>
</div>

<!-- PIN 登录页面 -->
<div id="page-pin-login" class="page hidden">
  <div class="pin-container">
    <div class="pin-icon">
      <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM12 17c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zM15.1 8H8.9V6c0-1.71 1.39-3.1 3.1-3.1s3.1 1.39 3.1 3.1v2z"/></svg>
    </div>
    <h1 class="pin-title">输入密码</h1>
    <p class="pin-subtitle" id="login-error-msg"></p>
    <div class="pin-dots" id="login-dots"></div>
    <div class="pin-keyboard" id="login-keyboard"></div>
    <button class="pin-btn-clear" id="btn-clear-login">清除</button>
  </div>
</div>

<!-- PIN 锁定页面 -->
<div id="page-pin-locked" class="page hidden">
  <div class="pin-container">
    <div class="pin-icon" style="background: linear-gradient(135deg, #FF3B30, #FF6961);">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zM4 12c0-4.42 3.58-8 8-8 1.85 0 3.55.63 4.9 1.69L5.69 16.9C4.63 15.55 4 13.85 4 12zm8 8c-1.85 0-3.55-.63-4.9-1.69L18.31 7.1C19.37 8.45 20 10.15 20 12c0 4.42-3.58 8-8 8z"/></svg>
    </div>
    <h1 class="pin-title">已锁定</h1>
    <p class="pin-subtitle">密码错误次数过多</p>
    <p class="pin-lockdown-timer" id="lockdown-timer"></p>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
